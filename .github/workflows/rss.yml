name: ISEAS RSS Auto Update

# Chạy mỗi ngày lúc 9:00 AM UTC+8 (Singapore time)
on:
  schedule:
    - cron: '0 1 * * *'  # 1:00 UTC ≈ 9:00 SG/HN
  workflow_dispatch:

jobs:
  build_rss:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 feedgen python-slugify

      - name: Run ISEAS RSS script
        run: |
          python iseas_rss.py

      - name: Commit and push RSS
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add rss/*.xml data.json || true
          git commit -m "Update RSS feeds" || echo "No changes to commit"
          git push